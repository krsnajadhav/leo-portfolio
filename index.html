<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leo Adverts | Professional Portfolio</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Helvetica', sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 20px; }
        .section { margin-bottom: 50px; page-break-inside: avoid; }
        h1, h2 { color: #e63946; border-bottom: 2px solid #e63946; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #f9f9f9; padding: 10px; border: 1px solid #ddd; }
        img { width: 100%; height: auto; display: block; }
        .desc { font-weight: bold; margin-top: 10px; display: block; }
        .pdf-btn { position: fixed; top: 20px; right: 20px; padding: 20px; background: #e63946; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body id="portfolio">
    <button class="pdf-btn" onclick="generatePDF()">Download Portfolio PDF</button>

    <h1>Leo Adverts - Project Portfolio</h1>

    <div class="section" id="project1">
        <h2>Corporate Signage & Branding</h2>
        <p>High-visibility solutions for corporate offices and showrooms.</p>
        <div class="grid" id="corp-gallery"></div>
    </div>

    <div class="section" id="project2">
        <h2>Retail & Shop Fit-outs</h2>
        <p>Complete end-to-end retail environment transformation.</p>
        <div class="grid" id="retail-gallery"></div>
    </div>

    <div class="section" id="project3">
        <h2>3D Letters & Neon Signage</h2>
        <p>Custom-fabricated premium dimensional signage.</p>
        <div class="grid" id="sign-gallery"></div>
    </div>

    <script>
        // Sort your 74 images into these arrays
        const corpImages = ["IMG-20260623-WA0051.jpg", "WhatsApp Image 2026-06-25 at 9.01.34 AM.jpeg", "WhatsApp Image 2026-06-25 at 9.01.30 AM.jpeg"];
        const retailImages = ["WhatsApp Image 2026-06-25 at 9.01.20 AM.jpeg", "IMG-20260419-WA0014.jpg", "WhatsApp Image 2026-06-25 at 9.20.26 AM.jpeg"];
        const signImages = ["IMG-20260511-WA0049.jpg", "IMG-20251226-WA0092.jpg", "IMG-20260216-WA0118.jpg"];

        function renderGallery(arr, elementId, desc) {
            const container = document.getElementById(elementId);
            arr.forEach(src => {
                const div = document.createElement('div');
                div.className = 'card';
                div.innerHTML = `<img src="${src}" alt="Portfolio"><span class="desc">${desc}</span>`;
                container.appendChild(div);
            });
        }

        renderGallery(corpImages, 'corp-gallery', 'Corporate Exterior Branding');
        renderGallery(retailImages, 'retail-gallery', 'Interior Shop Setup');
        renderGallery(signImages, 'sign-gallery', 'Custom 3D Lettering');

        function generatePDF() {
            const element = document.getElementById('portfolio');
            html2pdf(element, { filename: 'Leo_Adverts_Portfolio.pdf', image: { type: 'jpeg', quality: 1.0 }, jsPDF: { format: 'a3', orientation: 'portrait' } });
        }
    </script>
</body>
</html>
